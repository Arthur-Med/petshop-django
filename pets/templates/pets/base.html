{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PetShop Pro{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <div class="wrapper">
        
        <nav class="sidebar shadow-lg">
            
            <a href="{% url 'home' %}" class="text-decoration-none">
                <div class="p-4 mb-3 border-bottom border-secondary d-flex align-items-center transition-hover">
                    <span class="fs-2 me-2"></span>
                    <h4 class="text-white fw-bold mb-0 tracking-wide">  
                        PetShop<span class="text-primary">Pro</span>
                    </h4>
                </div>
            </a>
            
            <ul class="nav flex-column mt-2">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'home' %}">
                        Página Inicial
                    </a>
                </li>
                <li class="nav-item mt-1">
                    <a class="nav-link {% if request.path == '/cliente/novo/' %}active{% endif %}" href="{% url 'cadastrar_cliente' %}">
                        Cadastrar Cliente
                    </a>
                    <a class="nav-link {% if request.path == '/painel/' %}active{% endif %}" href="{% url 'painel' %}">
                        Painel de Controle
                    </a>
                </li>
            </ul>
        </nav>

        <div class="main-content">
            {% block content %}
            {% endblock %}
        </div>

    </div>

</body>
</html>
