{% extends 'pets/base.html' %}

{% block title %}Novo Cliente - PetShop Pro{% endblock %}

{% block content %}
<div class="container-fluid px-4 mt-4 caixa-animada">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark mb-0">Cadastrar Novo Dono</h2>
        <a href="{% url 'cadastrar_pet' %}" class="btn btn-outline-secondary shadow-sm">Voltar</a>
    </div>

    <div class="row">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nome Completo:</label>
                            {{ form.nome }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">E-mail:</label>
                            {{ form.email }}
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Telefone (WhatsApp):</label>
                            {{ form.telefone }}
                        </div>

                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold">
                            Salvar e Cadastrar Pet
                        </button>
                    </form>

                </div>
            </div>
        </div>
    </div>

</div>
{% endblock %}
