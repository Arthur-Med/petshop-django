{% extends 'pets/base.html' %}

{% block title %}Novo Pet - PetShop Pro{% endblock %}

{% block content %}
<div class="container-fluid px-4 mt-4 caixa-animada">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark mb-0">Cadastrar Novo Pet</h2>
        <a href="{% url 'painel' %}" class="btn btn-outline-secondary shadow-sm">Voltar ao Painel</a>
    </div>

    <div class="row">
        <div class="col-md-8 col-lg-6"> <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Dono (Cliente):</label>
                            {{ form.cliente }}
                            <small class="text-muted">
                                Dono não está na lista? <a href="{% url 'cadastrar_cliente' %}">Cadastre aqui</a>.
                            </small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nome do Pet:</label>
                            {{ form.nome }}
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Espécie:</label>
                                {{ form.especie }}
                            </div>
                            <div class="col-md-6 mt-3 mt-md-0">
                                <label class="form-label fw-bold">Raça (Opcional):</label>
                                {{ form.raca }}
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Peso (kg):</label>
                            {{ form.peso }}
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Salvar Cadastro</button>
                    </form>

                </div>
            </div>
        </div>
    </div>

</div>
{% endblock %}
